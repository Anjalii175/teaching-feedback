<!DOCTYPE html>
<html>
<head>
<title>Teaching Feedback System</title>
<style>
body { font-family: Arial; text-align: center; margin: 30px; }
.box { margin: 10px; }
input { width: 50px; }
button { padding: 10px; }
</style>
</head>

<body>
<h1 style="color:#2c3e50;">AI-Based Teaching Feedback System</h1>
<p style="color:gray; font-size:16px;">
This system evaluates teaching effectiveness based on student feedback and provides improvement suggestions.
</p>
<hr style="width:60%; margin:20px auto;">
<h2>Teaching Effectiveness Evaluation</h2>

<div class="box">Clarity: <input type="number" id="c1" min="1" max="5"></div>
<div class="box">Engagement: <input type="number" id="c2" min="1" max="5"></div>
<div class="box">Communication: <input type="number" id="c3" min="1" max="5"></div>
<div class="box">Doubt Solving: <input type="number" id="c4" min="1" max="5"></div>

<br>

<button onclick="calculate()">Check Result</button>

<h3 id="result"></h3>
<p id="suggestion"></p>

<script>
function calculate() {
let a = Number(document.getElementById("c1").value);
let b = Number(document.getElementById("c2").value);
let c = Number(document.getElementById("c3").value);
let d = Number(document.getElementById("c4").value);

let avg = (a+b+c+d)/4;

let res = "";
let sug = "Improvement Suggestions:<br>";

if(avg <= 2){
    res = "Poor";
}
else if(avg <= 3){
    res = "Average";
}
else if(avg <= 4){
    res = "Good";
}
else{
    res = "Excellent";
}

// Individual suggestions
if(a < 3){
    sug += "- Improve clarity of explanation<br>";
}
if(b < 3){
    sug += "- Increase student engagement<br>";
}
if(c < 3){
    sug += "- Improve communication skills<br>";
}
if(d < 3){
    sug += "- Focus on better doubt solving<br>";
}

if(sug === "Improvement Suggestions:<br>"){
    sug += "No major improvements needed. Great teaching!";
}

document.getElementById("result").innerHTML = "Result: " + res + " (Avg: " + avg.toFixed(2) + ")";
document.getElementById("suggestion").innerHTML = sug;
let avg = (a+b+c+d)/4;

let res = "";
let sug = "";

if(avg <= 2){
    res = "Poor";
    sug = "Improve clarity and communication.";
}
else if(avg <= 3){
    res = "Average";
    sug = "Work on engagement and doubt solving.";
}
else if(avg <= 4){
    res = "Good";
    sug = "Teaching is satisfactory.";
}
else{
    res = "Excellent";
    sug = "Great teaching performance!";
}

document.getElementById("result").innerHTML = "Result: " + res + " (Avg: " + avg.toFixed(2) + ")";
document.getElementById("suggestion").innerHTML = sug;
}
</script>

</body>
</html>
