<!DOCTYPE html>
<html>
<head>
<title>Smart Teaching Improvement System</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h1>Smart Teaching Improvement System</h1>

<h3>Enter Ratings (1 to 5)</h3>

Clarity <input id="c1" type="number"><br><br>
Engagement <input id="c2" type="number"><br><br>
Communication <input id="c3" type="number"><br><br>
Doubt Solving <input id="c4" type="number"><br><br>

<button onclick="analyze()">Analyze</button>

<h2 id="result"></h2>
<p id="plan"></p>

<script>

function analyze(){

let a = Number(document.getElementById("c1").value);
let b = Number(document.getElementById("c2").value);
let c = Number(document.getElementById("c3").value);
let d = Number(document.getElementById("c4").value);

if(!a || !b || !c || !d){
alert("Please fill all values");
return;
}

if(a<1||a>5||b<1||b>5||c<1||c>5||d<1||d>5){
alert("Enter values between 1 to 5 only");
return;
}

let avg = (a+b+c+d)/4;

// Result
let result="";
if(avg<=2) result="Poor";
else if(avg<=3) result="Average";
else if(avg<=4) result="Good";
else result="Excellent";

// Weakest Area
let min = Math.min(a,b,c,d);
let weak = "";
let solution = "";

if(min == a){
weak = "Clarity";
solution = "Use simple language, real-life examples and diagrams";
}
else if(min == b){
weak = "Engagement";
solution = "Ask questions, involve students and use activities";
}
else if(min == c){
weak = "Communication";
solution = "Speak clearly and maintain eye contact";
}
else{
weak = "Doubt Solving";
solution = "Give more time to students and solve doubts properly";
}

// Output
document.getElementById("result").innerHTML =
"Result: "+result+" (Average "+avg.toFixed(2)+")";

document.getElementById("plan").innerHTML =
"Weakest Area: "+weak+"<br>Solution: "+solution;

}

</script>

</body>
</html>
