<!DOCTYPE html>
<html>
<head>
<title>Research-Based Teaching Effectiveness</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
body { font-family: Arial; text-align: center; margin: 30px; background-color: #f0f0f0; }
h1 { color: darkblue; }
h3 { color: #333; }
</style>
</head>
<body>

<h1>Teaching Effectiveness (Research-Based)</h1>
<p>Website calculates teaching effectiveness based on research dataset</p>

<h3 id="result"></h3>
<canvas id="myChart" width="400" height="250"></canvas>

<script>
// ----- Example research dataset -----
// Replace this with your real dataset (CSV converted to JSON)
const researchData = [
    {clarity:4, engagement:3, communication:4, doubt:5},
    {clarity:3, engagement:4, communication:3, doubt:4},
    {clarity:5, engagement:5, communication:4, doubt:5},
    {clarity:2, engagement:3, communication:3, doubt:2}
];

// ----- Step 1: Calculate average score per parameter -----
let sumClarity=0, sumEng=0, sumComm=0, sumDoubt=0;
researchData.forEach(d => {
    sumClarity += d.clarity;
    sumEng += d.engagement;
    sumComm += d.communication;
    sumDoubt += d.doubt;
});

let n = researchData.length;
let avgClarity = sumClarity/n;
let avgEng = sumEng/n;
let avgComm = sumComm/n;
let avgDoubt = sumDoubt/n;

// ----- Step 2: Overall average -----
let overallAvg = (avgClarity + avgEng + avgComm + avgDoubt)/4;

// ----- Step 3: Determine category -----
let resultText = "";
if(overallAvg <= 2) resultText="Poor";
else if(overallAvg <= 3) resultText="Average";
else if(overallAvg <= 4) resultText="Good";
else resultText="Excellent";

// ----- Step 4: Display result -----
document.getElementById("result").innerHTML = 
"Teaching Effectiveness: <b>" + resultText + "</b> (Average Score: " + overallAvg.toFixed(2) + ")";

// ----- Step 5: Draw graph -----
const ctx = document.getElementById("myChart").getContext("2d");
new Chart(ctx,{
    type:'bar',
    data:{
        labels:['Clarity','Engagement','Communication','Doubt Solving'],
        datasets:[{
            label:'Average Ratings',
            data:[avgClarity, avgEng, avgComm, avgDoubt],
            backgroundColor:['#3498db','#2ecc71','#9b59b6','#f39c12']
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{ display:false },
            datalabels:{
                display:true,
                color:'black',
                anchor:'end',
                align:'end',
                font:{ weight:'bold', size:14 }
            }
        },
        scales:{ y:{ beginAtZero:true, max:5, ticks:{ stepSize:1 } } },
        animation:{ duration:1000, easing:'easeOutBounce' }
    },
    plugins:[ChartDataLabels]
});
</script>

</body>
</html>
