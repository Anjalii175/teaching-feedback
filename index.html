<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Feedback Learning System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; background:#f4f4f4; }
    h1 { text-align:center; }
    .container { display:flex; gap:20px; flex-wrap:wrap; }
    .panel { background:white; padding:20px; border-radius:10px; width:48%; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
    input, textarea, button { width:100%; margin:8px 0; padding:8px; }
    button { background:#6c63ff; color:white; border:none; cursor:pointer; border-radius:6px; }
    iframe { border-radius:10px; margin-top:10px; }
  </style>
</head>
<body>

<h1>📚 Smart Feedback Learning System</h1>

<div class="container">

  <!-- Teacher Panel -->
  <div class="panel">
    <h2>👩‍🏫 Teacher Panel</h2>

    <input type="text" placeholder="Topic Name">
    <input type="text" placeholder="Duration of Class">

    <textarea id="manualData" placeholder="Enter student scores (e.g. 60,70,80)"></textarea>

    <button onclick="processData()">Generate Analysis</button>

    <canvas id="chart"></canvas>

    <p id="suggestion"></p>

    <h3>📊 View Student Feedback</h3>
  <iframe src="https://docs.google.com/spreadsheets/d/182Gk-lOParvF65dYH_ZPEDnm7aNXczHE4JO5JsOrc1U/preview" width="100%" height="400"></iframe>
  </div>

  <!-- Student Panel -->
  <div class="panel">
    <h2>👨‍🎓 Student Panel</h2>

    <input type="text" placeholder="Enter Topic/Class">

    <p>Click below to fill feedback form:</p>
    
    <button onclick="window.open('https://forms.gle/iNEAdfn5iBWnKDNM8')">
      Fill Feedback Form
    </button>

  </div>

</div>

<script>
let scores = [];

function processData() {
  let manual = document.getElementById("manualData").value;

  if (manual) {
    scores = manual.split(",").map(Number);
    drawChart();
  }
}

function drawChart() {
  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: scores.map((_,i)=>"Student "+(i+1)),
      datasets: [{
        label: 'Scores',
        data: scores
      }]
    }
  });

  let suggestion = avg < 50 ? "⚠️ Students need re-teaching" : "✅ Students understood well";
  document.getElementById("suggestion").innerText = "Average: " + avg.toFixed(2) + "% | " + suggestion;
}
</script>

</body>
</html>
