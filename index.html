<!DOCTYPE html>
<html>
<head>
<title>Feedback System</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h1>Teaching Feedback System</h1>

<h3>Individual Analysis</h3>

Clarity <input id="c1" type="number"><br><br>
Engagement <input id="c2" type="number"><br><br>
Communication <input id="c3" type="number"><br><br>
Doubt <input id="c4" type="number"><br><br>

<button onclick="test()">Check</button>

<h2 id="output"></h2>

<script>
function test(){

let a = Number(document.getElementById("c1").value);
let b = Number(document.getElementById("c2").value);
let c = Number(document.getElementById("c3").value);
let d = Number(document.getElementById("c4").value);

let avg = (a+b+c+d)/4;

document.getElementById("output").innerHTML =
"Average = " + avg;

}
</script>

</body>
</html>
