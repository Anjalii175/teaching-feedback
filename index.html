<!DOCTYPE html>
<html>
<head>
<title>Teaching Feedback System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
}

.section {
    display: none;
}

.active {
    display: block;
}

button {
    margin: 10px;
    padding: 10px;
}

.card {
    border: 1px solid black;
    padding: 20px;
    width: 300px;
    margin: auto;
}
</style>

</head>

<body>

<h1>Teaching Feedback System</h1>

<button onclick="showPage('p1')">Individual</button>
<button onclick="showPage('p2')">Class Analysis</button>

<!-- PAGE 1 -->
<div id="p1" class="section active">

<h3>Individual Analysis</h3>

<div class="card">

Clarity <br><input id="c1" type="number"><br>
Engagement <br><input id="c2" type="number"><br>
Communication <br><input id="c3" type="number"><br>
Doubt <br><input id="c4" type="number"><br><br>

<button onclick="analyze()">Check</button>

<h3 id="result1"></h3>
<p id="suggestion1"></p>

</div>

</div>

<!-- PAGE 2 -->
<div id="p2" class="section">

<h3>Class Analysis</h3>

<div class="card">

<input type="file" id="file"><br><br>

<button onclick="process()">Upload</button>

<h3 id="result2"></h3>

<canvas id="chart"></canvas>

<p id="suggestion2"></p>

</div>

</div>

<script>

// PAGE SWITCH
function showPage(id){
document.getElementById("p1").classList.remove("active");
document.getElementById("p2").classList.remove("active");
document.getElementById(id).classList.add("active");
}

// INDIVIDUAL
function analyze(){

let a = Number(document.getElementById("c1").value);
let b = Number(document.getElementById("c2").value);
let c = Number(document.getElementById("c3").value);
let d = Number(document.getElementById("c4").value);

if(!a || !b || !c || !d){
alert("Fill all fields");
return;
}

let avg = (a+b+c+d)/4;

let res="";
if(avg<=2) res="Poor";
else if(avg<=3) res="Average";
else if(avg<=4) res="Good";
else res="Excellent";

// improvement
let sug="";

if(a<3) sug+="Improve clarity<br>";
if(b<3) sug+="Increase engagement<br>";
if(c<3) sug+="Better communication<br>";
if(d<3) sug+="Focus on doubts<br>";

if(sug=="") sug="Great teaching";

document.getElementById("result1").innerHTML =
"Result: "+res+" (Avg "+avg.toFixed(2)+")";

document.getElementById("suggestion1").innerHTML = sug;

}

// CSV
function process(){

let file = document.getElementById("file").files[0];

if(!file){
alert("Upload file");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let rows = e.target.result.split("\n");

let sum = 0;
let count = 0;

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

for(let j=0;j<cols.length;j++){

let val = Number(cols[j]);

if(!isNaN(val) && val>0){
sum += val;
count++;
}
}
}

let avg = sum/count;

document.getElementById("result2").innerHTML =
"Class Average: "+avg.toFixed(2);

// graph
let ctx = document.getElementById("chart").getContext("2d");

if(window.chart){
window.chart.destroy();
}

window.chart = new Chart(ctx,{
type:"bar",
data:{
labels:["Average"],
datasets:[{
label:"Score",
data:[avg]
}]
}
});

// suggestion
let sug="";
if(avg<=2) sug="Need major improvement";
else if(avg<=3) sug="Improve engagement";
else if(avg<=4) sug="Good but can improve";
else sug="Excellent teaching";

document.getElementById("suggestion2").innerHTML = sug;

};

reader.readAsText(file);

}

</script>

</body>
</html>
