<!DOCTYPE html>
<html>
<head>
<title>Teaching Feedback Analysis System</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
    margin: 20px;
}

h1 { color: darkblue; }

.box { margin: 10px; }

input, select {
    padding: 5px;
    margin: 5px;
}

button {
    padding: 10px 20px;
    background: blue;
    color: white;
    border: none;
    border-radius: 5px;
}

.section {
    background: white;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Teaching Feedback Analysis System</h1>

<!-- 🔹 INDIVIDUAL ANALYSIS -->
<div class="section">

<h2>Individual Feedback Analysis</h2>

<div class="box">Clarity: <input type="number" id="c1" min="1" max="5"></div>
<div class="box">Engagement: <input type="number" id="c2" min="1" max="5"></div>
<div class="box">Communication: <input type="number" id="c3" min="1" max="5"></div>
<div class="box">Doubt Solving: <input type="number" id="c4" min="1" max="5"></div>

<button onclick="calculate()">Analyze</button>

<h3 id="result"></h3>
<p id="suggestion"></p>

</div>

<!-- 🔹 CLASS ANALYSIS -->
<div class="section">

<h2>Class Feedback Analysis (Multiple Students)</h2>

<p>Enter number of students:</p>
<input type="number" id="num">

<button onclick="generate()">Generate Inputs</button>

<div id="inputs"></div>

<br>
<button onclick="calculateClass()">Calculate Class Average</button>

<h3 id="classResult"></h3>

</div>

<script>

let c3 = Number(document.getElementById("c3").value);
let c4 = Number(document.getElementById("c4").value);

let avg = (c1+c2+c3+c4)/4;

let result = "";
if(avg<=2) result="Poor";
else if(avg<=3) result="Average";
