<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher-Student Feedback System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; background:#f4f4f4; }
    h1 { text-align:center; }
    .container { display:flex; gap:20px; }
    .panel { background:white; padding:20px; border-radius:10px; width:50%; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
    input, select, textarea, button { width:100%; margin:8px 0; padding:8px; }
    button { background:#ff7a59; color:white; border:none; cursor:pointer; border-radius:6px; }
    canvas { margin-top:20px; }
  </style>
</head>
<body>

<h1>📚 Smart Feedback Learning System</h1>

<div class="container">

  <!-- Teacher Panel -->
  <div class="panel">
    <h2>👩‍🏫 Teacher Panel</h2>

    <input type="text" id="topic" placeholder="Topic Name">
    <input type="text" id="duration" placeholder="Duration of Class">

    <textarea id="manualData" placeholder="Enter student scores (e.g. 60,70,80)"></textarea>

    <button onclick="processData()">Generate Analysis</button>

    <canvas id="chart"></canvas>

    <p id="suggestion"></p>
  </div>

  <!-- Student Panel -->
  <div class="panel">
    <h2>👨‍🎓 Student Panel</h2>

    <input type="text" placeholder="Enter Topic/Class">

    <p>Click below to fill feedback form:</p>

    <button onclick="openForm()">Fill Feedback Form</button>

    <p id="response"></p>
  </div>

</div>

<script>
let scores = [];

function processData() {
  let manual = document.getElementById("manualData").value;

  if (manual) {
    scores = manual.split(",").map(Number);
    drawChart();
  }
}

function drawChart() {
  let avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: scores.map((_,i)=>"Student "+(i+1)),
      datasets: [{
        label: 'Scores',
        data: scores
      }]
    }
  });

  let suggestion = avg < 50 ? "⚠️ Students need re-teaching" : "✅ Students understood well";
  document.getElementById("suggestion").innerText = "Average: " + avg.toFixed(2) + "% | " + suggestion;
}

function openForm() {
  window.open("https://forms.gle/YOUR_GOOGLE_FORM_LINK");
}
</script>

</body>
</html>
