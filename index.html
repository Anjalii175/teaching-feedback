<!DOCTYPE html>
<html>
<head>
<title>Smart Teaching Improvement System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    text-align: center;
}

/* NAV */
.nav {
    padding: 15px;
}
.nav button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 20px;
    background: white;
    cursor: pointer;
}

/* SECTION */
.section { display:none; padding:30px; }
.active { display:block; }

/* CARD */
.card {
    background:white;
    color:black;
    padding:20px;
    margin:auto;
    width:320px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* INPUT */
input {
    padding:5px;
    margin:5px;
    width:60px;
}

/* BUTTON */
.main-btn {
    background:#667eea;
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
}

/* ANIMATION */
.fade {
    animation:fade 0.5s ease-in-out;
}
@keyframes fade {
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('p1')">👤 Individual</button>
<button onclick="showPage('p2')">📊 Class Analysis</button>
</div>

<!-- PAGE 1 -->
<div id="p1" class="section active fade">

<h1>📘 Smart Teaching Improvement System</h1>
<p>This system identifies teaching weaknesses and suggests improvement strategies.</p>

<div class="card">

Clarity <br><input id="c1" type="number" min="1" max="5"><br>
Engagement <br><input id="c2" type="number" min="1" max="5"><br>
Communication <br><input id="c3" type="number" min="1" max="5"><br>
Doubt Solving <br><input id="c4" type="number" min="1" max="5"><br>

<br>
<button class="main-btn" onclick="analyzeIndividual()">Analyze 🚀</button>

<h3 id="result1"></h3>
<p id="suggestion1"></p>

</div>

</div>

<!-- PAGE 2 -->
<div id="p2" class="section fade">

<h1>📊 Class Data Analysis</h1>

<div class="card">

<input type="file" id="fileInput"><br><br>
<button class="main-btn" onclick="analyzeCSV()">Upload & Analyze 📈</button>

<h3 id="result2"></h3>

<canvas id="chart"></canvas>

<p id="suggestion2"></p>

</div>

</div>

<script>

// PAGE SWITCH
function showPage(page){
document.getElementById("p1").classList.remove("active");
document.getElementById("p2").classList.remove("active");
document.getElementById(page).classList.add("active");
}

// INDIVIDUAL ANALYSIS (SMART SYSTEM)
function analyzeIndividual(){

let a=Number(document.getElementById("c1").value);
let b=Number(document.getElementById("c2").value);
let c=Number(document.getElementById("c3").value);
let d=Number(document.getElementById("c4").value);

if(!a || !b || !c || !d){
alert("Fill all fields");
return;
}

if(a<1||a>5||b<1||b>5||c<1||c>5||d<1||d>5){
alert("Enter values between 1 to 5");
return;
}

let avg=(a+b+c+d)/4;

let res="";
if(avg<=2) res="Poor";
else if(avg<=3) res="Average";
else if(avg<=4) res="Good";
else res="Excellent";

// 🔥 SMART IMPROVEMENT ENGINE
let sug="<b>Improvement Plan:</b><br><br>";

if(a<3){
sug+="🔹 Clarity Low:<br>";
sug+="- Use simple language<br>";
sug+="- Add real-life examples<br>";
sug+="- Use diagrams/visuals<br><br>";
}

if(b<3){
sug+="🔹 Engagement Low:<br>";
sug+="- Ask questions in class<br>";
sug+="- Encourage participation<br>";
sug+="- Use interactive activities<br><br>";
}

if(c<3){
sug+="🔹 Communication Issue:<br>";
sug+="- Speak clearly and slowly<br>";
sug+="- Maintain eye contact<br>";
sug+="- Use proper tone<br><br>";
}

if(d<3){
sug+="🔹 Doubt Solving Weak:<br>";
sug+="- Allocate time for questions<br>";
sug+="- Encourage doubt asking<br>";
sug+="- Give additional support<br><br>";
}

if(sug=="<b>Improvement Plan:</b><br><br>"){
sug="✅ Excellent teaching. No major improvements needed.";
}

document.getElementById("result1").innerHTML=
"Result: "+res+" (Avg: "+avg.toFixed(2)+")";

document.getElementById("suggestion1").innerHTML=sug;

}

// CSV ANALYSIS
function analyzeCSV(){

let file=document.getElementById("fileInput").files[0];

if(!file){
alert("Upload CSV file");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let rows=e.target.result.split("\n");

let sum=0,count=0;

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

for(let j=0;j<cols.length;j++){

let val=Number(cols[j]);

if(!isNaN(val)&&val>0){
sum+=val;
count++;
}
}
}

let avg=sum/count;

document.getElementById("result2").innerHTML=
"Class Average: "+avg.toFixed(2);

// GRAPH
let ctx=document.getElementById("chart").getContext("2d");

if(window.chart){
window.chart.destroy();
}

window.chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Class Avg"],
datasets:[{
label:"Score",
data:[avg]
}]
}
});

// 🔥 CLASS IMPROVEMENT ENGINE
let sug="";

if(avg<=2){
sug="🔴 Major improvement needed: Focus on basic teaching clarity, communication and student understanding.";
}
else if(avg<=3){
sug="🟠 Improve engagement and interaction techniques in class.";
}
else if(avg<=4){
sug="🟢 Teaching is good, but can improve with interactive methods and real-life examples.";
}
else{
sug="🟢 Excellent performance. Maintain consistency and innovation.";
}

document.getElementById("suggestion2").innerHTML=sug;

};

reader.readAsText(file);

}

</script>

</body>
</html>
