<script>
function calculate() {

// taking input values
let clarity = Number(document.getElementById("c1").value);
let engagement = Number(document.getElementById("c2").value);
let communication = Number(document.getElementById("c3").value);
let doubt = Number(document.getElementById("c4").value);

// calculating average score
let average = (clarity + engagement + communication + doubt) / 4;

// deciding result
let result = "";
if(average <= 2){
    result = "Poor";
}
else if(average <= 3){
    result = "Average";
}
else if(average <= 4){
    result = "Good";
}
else{
    result = "Excellent";
}

// suggestions based on weak areas
let suggestion = "<b>Improvement Suggestions:</b><br>";

if(clarity < 3){
    suggestion += "- Use simpler explanations and examples<br>";
}
if(engagement < 3){
    suggestion += "- Increase interaction with students<br>";
}
if(communication < 3){
    suggestion += "- Improve communication clarity<br>";
}
if(doubt < 3){
    suggestion += "- Give more time for doubt solving<br>";
}

// if everything is good
if(suggestion === "<b>Improvement Suggestions:</b><br>"){
    suggestion += "No major improvement needed. Teaching is effective.";
}

// display output
document.getElementById("result").innerHTML =
"Result: " + result + " (Avg Score: " + average.toFixed(2) + ")";

document.getElementById("suggestion").innerHTML = suggestion;

}
</script>
