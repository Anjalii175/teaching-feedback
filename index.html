<!DOCTYPE html>
<html>

<head>
<title>AI Teaching Feedback System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin:0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.nav button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    background:white;
    cursor:pointer;
}

.section{display:none;}
.active{display:block;}

.box{
    background:white;
    color:black;
    padding:20px;
    width:320px;
    margin:auto;
    border-radius:15px;
}

input{
    padding:6px;
    margin:5px;
    width:80px;
}

button{
    padding:10px;
    margin-top:10px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.result{
    margin-top:10px;
    background:#f1f1f1;
    padding:10px;
    border-radius:10px;
}
</style>

</head>

<body>

<header>✨ AI-Based Teaching Feedback System</header>

<div class="nav">
<button onclick="showPage('p1')">Individual</button>
<button onclick="showPage('p2')">Class Analysis</button>
</div>

<!-- PAGE 1 -->
<div id="p1" class="section active">

<h3>Individual Feedback</h3>

<div class="box">

Clarity <br><input id="c1" type="number" min="1" max="5"><br>
Engagement <br><input id="c2" type="number" min="1" max="5"><br>
Communication <br><input id="c3" type="number" min="1" max="5"><br>
Doubt Solving <br><input id="c4" type="number" min="1" max="5"><br>

<button onclick="analyze()">Analyze</button>

<div class="result">
<h3 id="res1"></h3>
<p id="plan"></p>
</div>

</div>
</div>

<!-- PAGE 2 -->
<div id="p2" class="section">

<h3>Upload CSV</h3>

<div class="box">

<input type="file" id="file"><br>

<button onclick="process()">Analyze File</button>

<div class="result">
<h3 id="res2"></h3>
<p id="extra"></p>
</div>

<canvas id="chart"></canvas>

</div>

</div>

<script>

// page switch
function showPage(id){
document.getElementById("p1").classList.remove("active");
document.getElementById("p2").classList.remove("active");
document.getElementById(id).classList.add("active");
}

// individual
function analyze(){

let a=Number(c1.value);
let b=Number(c2.value);
let c=Number(c3.value);
let d=Number(c4.value);

if(!a||!b||!c||!d){
alert("Fill all values");
return;
}

let avg=(a+b+c+d)/4;

let res = avg<=2?"Poor":avg<=3?"Average":avg<=4?"Good":"Excellent";

let min=Math.min(a,b,c,d);

let weak="";
if(min==a) weak="Clarity";
else if(min==b) weak="Engagement";
else if(min==c) weak="Communication";
else weak="Doubt Solving";

document.getElementById("res1").innerHTML =
"Result: "+res+" ("+avg.toFixed(2)+")";

document.getElementById("plan").innerHTML =
"⚠ Weak Area: "+weak;
}

// CSV PROCESS
function process(){

let file=document.getElementById("file").files[0];

if(!file){
alert("Upload CSV file");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let rows=e.target.result.trim().split("\n");

let sum=0,count=0;

let clarity=0,eng=0,comm=0,doubt=0;

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

let c1=parseFloat(cols[0])||0;
let c2=parseFloat(cols[1])||0;
let c3=parseFloat(cols[2])||0;
let c4=parseFloat(cols[3])||0;

clarity+=c1;
eng+=c2;
comm+=c3;
doubt+=c4;

sum+=c1+c2+c3+c4;
count+=4;
}

if(count==0){
res2.innerHTML="Invalid File ❌";
return;
}

let avg=sum/count;

let n=rows.length-1;

clarity/=n;
eng/=n;
comm/=n;
doubt/=n;

// strong + weak
let max=Math.max(clarity,eng,comm,doubt);
let min=Math.min(clarity,eng,comm,doubt);

let strong="",weak="";

if(max==clarity) strong="Clarity";
else if(max==eng) strong="Engagement";
else if(max==comm) strong="Communication";
else strong="Doubt Solving";

if(min==clarity) weak="Clarity";
else if(min==eng) weak="Engagement";
else if(min==comm) weak="Communication";
else weak="Doubt Solving";

// result
document.getElementById("res2").innerHTML =
"Class Avg: "+avg.toFixed(2);

document.getElementById("extra").innerHTML =
"⭐ Strong: "+strong+"<br>⚠ Weak: "+weak;

// GRAPH (IMPORTANT FIX)
let ctx=document.getElementById("chart");

if(window.chart){
window.chart.destroy();
}

window.chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Clarity","Engagement","Communication","Doubt"],
datasets:[{
label:"Average Scores",
data:[clarity,eng,comm,doubt],
backgroundColor:["red","blue","green","orange"]
}]
}
});

};

reader.readAsText(file);

}

</script>

</body>
</html>
