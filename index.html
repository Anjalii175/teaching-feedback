<!DOCTYPE html>
<html>
<head>
<title>Student Panel</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
  text-align: center;
  padding: 40px;
}

h1{
  color: #444;
}

.card{
  background: #ffffff;
  padding: 25px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

button{
  padding: 12px;
  margin: 10px;
  width: 85%;
  border: none;
  border-radius: 8px;
  background: #7c83fd;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover{
  background: #5a61e6;
}

h3{
  color: #555;
}
</style>

</head>

<body>

<h1>📚 Smart Learning System</h1>

<div class="card">

<h3>🧠 Attempt Quiz</h3>
<button onclick="window.open('https://forms.gle/J9fATCnbmjb1mrAY6')">
Start Quiz
</button>

<h3>💬 Feedback</h3>
<button onclick="window.open('https://forms.gle/fzY3YDtUxTrUS5Co6')">
Give Feedback
</button>

</div>

</body>
</html>
