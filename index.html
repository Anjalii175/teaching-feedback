<!DOCTYPE html>
<html>

<head>
<title>AI Teaching Feedback System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
}

/* header */
header {
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* nav buttons */
.nav button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #333;
    cursor: pointer;
    transition: 0.3s;
}
.nav button:hover {
    transform: scale(1.1);
}

/* pages */
.section { display:none; }
.active { display:block; }

/* card */
.box {
    background: white;
    color: black;
    padding: 25px;
    width: 320px;
    margin: auto;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
    animation: fade 0.5s;
}

@keyframes fade {
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

input {
    padding: 8px;
    margin: 5px;
    width: 80px;
    border-radius: 5px;
    border: 1px solid gray;
}

.mainbtn {
    padding: 10px 20px;
    margin-top: 10px;
    border:none;
    border-radius: 10px;
    background:#667eea;
    color:white;
    cursor:pointer;
}
.mainbtn:hover{
    background:#5a67d8;
}

.resultBox{
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    background:#f1f1f1;
}
</style>

</head>

<body>

<header>✨ AI-Based Teaching Feedback System</header>

<div class="nav">
<button onclick="showPage('p1')">👤 Individual</button>
<button onclick="showPage('p2')">📊 Class Analysis</button>
</div>

<!-- PAGE 1 -->
<div id="p1" class="section active">

<h3>Individual Analysis</h3>

<div class="box">

Clarity <br><input id="c1" type="number" min="1" max="5"><br>
Engagement <br><input id="c2" type="number" min="1" max="5"><br>
Communication <br><input id="c3" type="number" min="1" max="5"><br>
Doubt Solving <br><input id="c4" type="number" min="1" max="5"><br>

<button class="mainbtn" onclick="analyze()">Analyze</button>

<div class="resultBox">
<h3 id="result"></h3>
<p id="plan"></p>
</div>

</div>

</div>

<!-- PAGE 2 -->
<div id="p2" class="section">

<h3>Class Analysis (Upload CSV)</h3>

<div class="box">

<input type="file" id="file"><br><br>

<button class="mainbtn" onclick="process()">Analyze File</button>

<div class="resultBox">
<h3 id="result2"></h3>
<p id="suggestion"></p>
</div>

<canvas id="chart"></canvas>

</div>

</div>

<script>

// page switch
function showPage(id){
document.getElementById("p1").classList.remove("active");
document.getElementById("p2").classList.remove("active");
document.getElementById(id).classList.add("active");
}

// individual
function analyze(){

let a = Number(c1.value);
let b = Number(c2.value);
let c = Number(c3.value);
let d = Number(c4.value);

if(!a||!b||!c||!d){
alert("Fill all values");
return;
}

let avg=(a+b+c+d)/4;

let res = avg<=2?"Poor":avg<=3?"Average":avg<=4?"Good":"Excellent";

// weakest
let min=Math.min(a,b,c,d);
let weak="",sol="";

if(min==a){weak="Clarity"; sol="Use diagrams & simple explanation";}
else if(min==b){weak="Engagement"; sol="Increase interaction";}
else if(min==c){weak="Communication"; sol="Speak clearly";}
else{weak="Doubt Solving"; sol="Give more time to students";}

document.getElementById("result").innerHTML =
"Result: "+res+" ("+avg.toFixed(2)+")";

document.getElementById("plan").innerHTML =
"⚠ Weak Area: "+weak+"<br>💡 Suggestion: "+sol;

}

// CSV + GRAPH
function process(){

let file=document.getElementById("file").files[0];

if(!file){
alert("Upload CSV file");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let rows=e.target.result.trim().split("\n");

let sum=0,count=0;

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

for(let j=0;j<cols.length;j++){

let val=parseFloat(cols[j]);

if(!isNaN(val)){
sum+=val;
count++;
}
}
}

if(count==0){
result2.innerHTML="Invalid File ❌";
return;
}

let avg=sum/count;

result2.innerHTML="📊 Class Average: "+avg.toFixed(2);

// graph
let ctx=document.getElementById("chart").getContext("2d");

if(window.chart){
window.chart.destroy();
}

window.chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Class Avg"],
datasets:[{
label:"Score",
data:[avg],
backgroundColor:["#667eea"]
}]
}
});

// suggestion
let sug="";
if(avg<=2) sug="⚠ Needs major improvement";
else if(avg<=3) sug="⚠ Improve engagement";
else if(avg<=4) sug="👍 Good but improve more";
else sug="🔥 Excellent teaching";

suggestion.innerHTML=sug;

};

reader.readAsText(file);

}

</script>

</body>
</html>
