<!DOCTYPE html>
<html>
<head>
<title>Smart Teaching Feedback Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    margin:0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

h1{
    margin-top:20px;
    font-size:30px;
}

p{
    font-size:14px;
    opacity:0.9;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:25px;
    background: linear-gradient(45deg,#ff7e5f,#feb47b);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.box{
    background:white;
    color:black;
    padding:25px;
    width:360px;
    margin:auto;
    border-radius:20px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.3);
    animation:fade 0.5s;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1;}
}

.section{display:none;}
.active{display:block;}

input{
    margin:5px;
    padding:6px;
    width:80px;
}

.result{
    margin-top:15px;
    padding:15px;
    background:#f1f1f1;
    border-radius:10px;
    font-weight:bold;
}

canvas{
    margin-top:20px;
}

</style>

</head>

<body>

<h1>✨ Smart Teaching Feedback Analyzer</h1>
<p>Analyze teaching performance using student feedback data 📊</p>

<button onclick="showPage('p1')">👤 Individual</button>
<button onclick="showPage('p2')">📊 Class Analysis</button>

<!-- INDIVIDUAL -->
<div id="p1" class="section active">

<h3>Individual Analysis</h3>

<div class="box">

Clarity <br><input id="c1" type="number" min="1" max="5"><br>
Engagement <br><input id="c2" type="number" min="1" max="5"><br>
Communication <br><input id="c3" type="number" min="1" max="5"><br>
Doubt Solving <br><input id="c4" type="number" min="1" max="5"><br>

<button onclick="analyze()">Analyze</button>

<div class="result">
<h3 id="r1"></h3>
<p id="s1"></p>
</div>

</div>
</div>

<!-- CLASS ANALYSIS -->
<div id="p2" class="section">

<h3>Class Analysis (Upload CSV)</h3>

<div class="box">

<input type="file" id="file"><br>

<button onclick="process()">Analyze</button>

<div class="result">
<h3 id="r2"></h3>
<p id="s2"></p>
</div>

<canvas id="chart"></canvas>

</div>
</div>

<script>

// page switch
function showPage(id){
document.getElementById("p1").classList.remove("active");
document.getElementById("p2").classList.remove("active");
document.getElementById(id).classList.add("active");
}

// INDIVIDUAL
function analyze(){

let a = Number(document.getElementById("c1").value);
let b = Number(document.getElementById("c2").value);
let c = Number(document.getElementById("c3").value);
let d = Number(document.getElementById("c4").value);

if(!a || !b || !c || !d){
alert("Please fill all values");
return;
}

let avg = (a+b+c+d)/4;

let res = avg<=2?"Poor":avg<=3?"Average":avg<=4?"Good":"Excellent";

let sug="";

if(a<3){
sug+="🔹 Improve clarity using examples and diagrams.<br>";
}
if(b<3){
sug+="🔹 Increase engagement through interaction.<br>";
}
if(c<3){
sug+="🔹 Improve communication skills.<br>";
}
if(d<3){
sug+="🔹 Focus more on doubt solving.<br>";
}

if(sug===""){
sug="🎉 Excellent teaching performance!";
}

document.getElementById("r1").innerHTML =
"Result: "+res+" ("+avg.toFixed(2)+")";

document.getElementById("s1").innerHTML = sug;
}

// CLASS ANALYSIS
function process(){

let file = document.getElementById("file").files[0];

if(!file){
alert("Upload CSV file");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let lines = e.target.result.trim().split(/\r?\n/);

let clarity=0,eng=0,comm=0,doubt=0;
let count=0;

for(let i=1;i<lines.length;i++){

let row = lines[i].split(",");

if(row.length < 4) continue;

let v1 = parseFloat(row[0]);
let v2 = parseFloat(row[1]);
let v3 = parseFloat(row[2]);
let v4 = parseFloat(row[3]);

if(isNaN(v1)||isNaN(v2)||isNaN(v3)||isNaN(v4)) continue;

clarity+=v1;
eng+=v2;
comm+=v3;
doubt+=v4;

count++;
}

if(count==0){
document.getElementById("r2").innerHTML="❌ Invalid CSV data";
return;
}

// averages
clarity/=count;
eng/=count;
comm/=count;
doubt/=count;

let avg = (clarity+eng+comm+doubt)/4;

// performance
let performance = avg<=2?"Poor":avg<=3?"Average":avg<=4?"Good":"Excellent";

// strong & weak
let arr = [clarity,eng,comm,doubt];
let names = ["Clarity","Engagement","Communication","Doubt Solving"];

let strong = names[arr.indexOf(Math.max(...arr))];
let weak = names[arr.indexOf(Math.min(...arr))];

// improvement
let improve="";

if(weak==="Clarity"){
improve="Use visual aids and simplify explanations.";
}
else if(weak==="Engagement"){
improve="Use interactive teaching methods.";
}
else if(weak==="Communication"){
improve="Improve clarity and confidence.";
}
else{
improve="Encourage more doubt solving.";
}

// insight
let insight="";

if(performance==="Excellent"){
insight="Students are highly satisfied.";
}
else if(performance==="Good"){
insight="Teaching is effective with scope for improvement.";
}
else if(performance==="Average"){
insight="Teaching needs improvement.";
}
else{
insight="Immediate improvement required.";
}

// display
document.getElementById("r2").innerHTML =
"📊 Class Avg: "+avg.toFixed(2)+" ("+performance+")";

document.getElementById("s2").innerHTML =
"⭐ Strong: "+strong+
"<br>⚠ Weak: "+weak+
"<br>💡 Improve: "+improve+
"<br>📌 Insight: "+insight;

// GRAPH
let ctx = document.getElementById("chart").getContext("2d");

if(window.chart){
window.chart.destroy();
}

window.chart = new Chart(ctx,{
type:"bar",
data:{
labels:names,
datasets:[{
label:"Average Scores",
data:arr,
backgroundColor:["#ff6b6b","#4dabf7","#51cf66","#fcc419"]
}]
}
});

};

reader.readAsText(file);
}

</script>

</body>
</html>
