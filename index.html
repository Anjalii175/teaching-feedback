<h1>Class Feedback Dashboard</h1>

<!-- Teacher Panel -->
<div class="panel">
<h2>Teacher Panel</h2>
Topic: <input type="text" id="topic"><br>
Duration: <input type="number" id="duration" placeholder="minutes"><br>
<button onclick="showTeacherGraph()">Show Topic Feedback</button>
<div id="teacherGraph"></div>
</div>

<!-- Student Panel -->
<div class="panel">
<h2>Student Feedback</h2>
Topic: <input type="text" id="studentTopic"><br>
Clarity <input type="number" min="1" max="5" id="s1"><br>
Understanding <input type="number" min="1" max="5" id="s2"><br>
Doubt <input type="number" min="1" max="5" id="s3"><br>
<button onclick="submitStudentFeedback()">Submit Feedback</button>
<div id="studentGraph"></div>
</div>
