<!DOCTYPE html>
<html>

<head>
<title>Smart Teaching Improvement System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #f5f5f5;
}

.section { display: none; }
.active { display: block; }

.box {
    background: white;
    padding: 20px;
    margin: auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

button {
    padding: 10px;
    margin: 10px;
    border: none;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

input {
    padding: 5px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>📘 Smart Teaching Improvement System</h1>

<button onclick="showPage('p1')">👤 Individual</button>
<button onclick="showPage('p2')">📊 Class Analysis</button>

<!-- PAGE 1 -->
<div id="p1" class="section active">

<h3>Individual Analysis</h3>

<div class="box">

Clarity <br><input id="c1" type="number"><br>
Engagement <br><input id="c2" type="number"><br>
Communication <br><input id="c3" type="number"><br>
Doubt Solving <br><input id="c4" type="number"><br><br>

<button onclick="analyze()">Analyze</button>

<h3 id="result"></h3>
<p id="plan"></p>

</div>

</div>

<!-- PAGE 2 -->
<div id="p2" class="section">

<h3>Class Analysis (Upload CSV)</h3>

<div class="box">

<input type="file" id="file"><br><br>

<button onclick="process()">Analyze File</button>

<h3 id="result2"></h3>

<canvas id="chart"></canvas>

<p id="suggestion"></p>

</div>

</div>

<script>

// PAGE SWITCH
function showPage(id){
document.getElementById("p1").classList.remove("active");
document.getElementById("p2").classList.remove("active");
document.getElementById(id).classList.add("active");
}

// INDIVIDUAL
function analyze(){

let a = Number(document.getElementById("c1").value);
let b = Number(document.getElementById("c2").value);
let c = Number(document.getElementById("c3").value);
let d = Number(document.getElementById("c4").value);

if(!a || !b || !c || !d){
alert("Fill all values");
return;
}

if(a<1||a>5||b<1||b>5||c<1||c>5||d<1||d>5){
alert("Enter values between 1 to 5");
return;
}

let avg = (a+b+c+d)/4;

// result
let result="";
if(avg<=2) result="Poor";
else if(avg<=3) result="Average";
else if(avg<=4) result="Good";
else result="Excellent";

// weakest area
let min = Math.min(a,b,c,d);
let weak="", solution="";

if(min==a){
weak="Clarity";
solution="Use simple language, examples and diagrams";
}
else if(min==b){
weak="Engagement";
solution="Ask questions and involve students";
}
else if(min==c){
weak="Communication";
solution="Speak clearly and confidently";
}
else{
weak="Doubt Solving";
solution="Give more time for doubts";
}

// output
document.getElementById("result").innerHTML =
"Result: "+result+" (Avg "+avg.toFixed(2)+")";

document.getElementById("plan").innerHTML =
"Weakest Area: "+weak+"<br>Solution: "+solution;

}

// CSV + GRAPH
function process(){

let file = document.getElementById("file").files[0];

if(!file){
alert("Upload file");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let rows = e.target.result.split("\n");

let sum=0, count=0;

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

for(let j=0;j<cols.length;j++){

let val = Number(cols[j]);

if(!isNaN(val) && val>0){
sum+=val;
count++;
}
}
}

let avg = sum/count;

document.getElementById("result2").innerHTML =
"Class Average: "+avg.toFixed(2);

// graph
let ctx = document.getElementById("chart").getContext("2d");

if(window.chart){
window.chart.destroy();
}

window.chart = new Chart(ctx,{
type:"bar",
data:{
labels:["Average"],
datasets:[{
label:"Score",
data:[avg]
}]
}
});

// improvement
let sug="";
if(avg<=2) sug="Major improvement needed";
else if(avg<=3) sug="Improve engagement";
else if(avg<=4) sug="Good but can improve";
else sug="Excellent teaching";

document.getElementById("suggestion").innerHTML = sug;

};

reader.readAsText(file);

}

</script>

</body>

</html>
