<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Panel</title>

<style>
body{
  font-family: Arial;
  background: #eef2f3;
  text-align: center;
  padding: 30px;
}

.card{
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button{
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  background: #5a67d8;
  color: white;
  cursor: pointer;
  width: 80%;
}

#studentQuiz{
  text-align: left;
  margin-top: 15px;
}
</style>
</head>

<body>

<h1>📚 Student Panel</h1>

<div class="card">

<p>🤖 AI Generated Quiz</p>

<h3>📋 Quiz</h3>
<div id="studentQuiz">Loading...</div>

<h3>💬 Give Feedback</h3>
<button onclick="window.open('https://forms.gle/fzY3YDtUxTrUS5Co6')">
Fill Feedback
</button>

</div>

<script>
window.onload = function(){
  let quiz = localStorage.getItem("quiz");

  if(quiz){
    document.getElementById("studentQuiz").innerText = quiz;
  } else {
    document.getElementById("studentQuiz").innerText = "No quiz available yet. Please wait for teacher.";
  }
}
</script>

</body>
</html>
