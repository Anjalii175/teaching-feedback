<!DOCTYPE html>
<html>
<head>
<title>Feedback Analysis System</title>

<style>
body { font-family: Arial; text-align:center; background:#f2f2f2; }
button { padding:10px; background:blue; color:white; border:none; }
</style>
</head>

<body>

<h1>Feedback Analysis (Upload Data)</h1>

<p>Upload your Google Form Excel (CSV file)</p>

<input type="file" id="fileInput">

<br><br>
<button onclick="processFile()">Analyze Data</button>

<h2 id="output"></h2>

<script>
function processFile(){

let file = document.getElementById("fileInput").files[0];

if(!file){
alert("Please upload file");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let text = e.target.result;
let rows = text.split("\n");

let total = 0;
let count = 0;

// skip header row (i=1)
for(let i=1; i<rows.length; i++){

let cols = rows[i].split(",");

// assume ratings are in column 1 (change if needed)
let value = Number(cols[1]);

if(!isNaN(value)){
total += value;
count++;
}
}

let avg = total / count;

let result = "";

if(avg<=2) result="Poor";
else if(avg<=3) result="Average";
else if(avg<=4) result="Good";
else result="Excellent";

document.getElementById("output").innerHTML =
"Average Score: " + avg.toFixed(2) + "<br>Performance: " + result;

};

reader.readAsText(file);
}
</script>

</body>
</html>
