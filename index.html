<!DOCTYPE html>
<html>

<head>
<title>Smart Teaching Improvement System</title>

<!-- Chart.js for graph -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #f5f5f5;
}

/* Page sections */
.section {
    display: none;
}

.active {
    display: block;
}

/* Card box */
.box {
    background: white;
    padding: 20px;
    margin: auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

/* Buttons */
button {
    padding: 10px;
    margin: 10px;
    border: none;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
}

/* Input */
input {
    padding: 5px;
    margin: 5px;
}
</style>

</head>

<body>

<button onclick="showPage('p1')">👤 Individual</button>

<p id="plan"></p>

</div>

</div>

<!-- PAGE 2 -->
<div id="p2" class="section">

<h3>Class Analysis (Upload CSV)</h3>

<div class="box">

<input type="file" id="file"><br><br>

<button onclick="process()">Analyze File</button>

<h3 id="result2"></h3>

<canvas id="chart"></canvas>

<p id="suggestion"></p>

</div>

</div>

}
