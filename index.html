<!DOCTYPE html>
<html>
<head>
<title>AI Teaching Feedback System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background: linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.box{
background:white;
color:black;
padding:20px;
margin:auto;
width:340px;
border-radius:15px;
}

button{
padding:10px;
margin:10px;
border:none;
background:#667eea;
color:white;
border-radius:10px;
cursor:pointer;
}

input{margin:5px;}
canvas{margin-top:20px;}
</style>

</head>

<body>

<h1>✨ AI-Based Teaching Feedback System</h1>

<button onclick="show('p1')">Individual</button>
<button onclick="show('p2')">Class Analysis</button>

<div id="p1" class="box">
<h3>Individual Analysis</h3>

Clarity <input id="c1" type="number" min="1" max="5"><br>
Engagement <input id="c2" type="number" min="1" max="5"><br>
Communication <input id="c3" type="number" min="1" max="5"><br>
Doubt Solving <input id="c4" type="number" min="1" max="5"><br>

<button onclick="analyze()">Analyze</button>

<h3 id="r1"></h3>
<p id="s1"></p>

</div>

<div id="p2" class="box" style="display:none;">
<h3>Upload CSV</h3>

<input type="file" id="file"><br>
<button onclick="process()">Analyze</button>

<h3 id="r2"></h3>
<p id="s2"></p>

<canvas id="chart"></canvas>
</div>

<script>

function show(id){
p1.style.display="none";
p2.style.display="none";
document.getElementById(id).style.display="block";
}

// INDIVIDUAL
function analyze(){

let a=+c1.value;
let b=+c2.value;
let c=+c3.value;
let d=+c4.value;

if(!a||!b||!c||!d){
alert("Fill all values");
return;
}

let avg=(a+b+c+d)/4;

let res = avg<=2?"Poor":avg<=3?"Average":avg<=4?"Good":"Excellent";

// better suggestions
let sug="";

if(a<3){
sug+="🔹 Improve clarity by using real-life examples, diagrams, and simpler explanations.<br>";
}
if(b<3){
sug+="🔹 Increase engagement through questioning, discussions, and interactive activities.<br>";
}
if(c<3){
sug+="🔹 Work on communication skills such as voice clarity and structured explanation.<br>";
}
if(d<3){
sug+="🔹 Allocate time for doubt solving and encourage students to ask questions.<br>";
}

if(sug===""){
sug="🎉 Teaching performance is strong across all parameters. Maintain consistency!";
}

r1.innerHTML="Result: "+res+" ("+avg.toFixed(2)+")";
s1.innerHTML=sug;
}

// CSV
function process(){

let file=fileInput();

if(!file) return;

let reader=new FileReader();

reader.onload=function(e){

let lines=e.target.result.trim().split("\n");

let clarity=0,eng=0,comm=0,doubt=0;
let count=0;

for(let i=1;i<lines.length;i++){

let row=lines[i].split(",");

if(row.length<4) continue;

let c1=parseFloat(row[0]);
let c2=parseFloat(row[1]);
let c3=parseFloat(row[2]);
let c4=parseFloat(row[3]);

if(isNaN(c1)||isNaN(c2)||isNaN(c3)||isNaN(c4)) continue;

clarity+=c1;
eng+=c2;
comm+=c3;
doubt+=c4;

count++;
}

if(count==0){
r2.innerHTML="❌ Invalid CSV data";
return;
}

clarity/=count;
eng/=count;
comm/=count;
doubt/=count;

let avg=(clarity+eng+comm+doubt)/4;

// strong/weak
let arr=[clarity,eng,comm,doubt];
let names=["Clarity","Engagement","Communication","Doubt Solving"];

let maxI=arr.indexOf(Math.max(...arr));
let minI=arr.indexOf(Math.min(...arr));

let strong=names[maxI];
let weak=names[minI];

// better improvement
let improvement="";

if(weak==="Clarity"){
improvement="Focus on structured explanation, use visual aids and simplify complex topics.";
}
else if(weak==="Engagement"){
improvement="Adopt interactive teaching methods like questioning and group activities.";
}
else if(weak==="Communication"){
improvement="Improve voice modulation, clarity of speech, and confidence.";
}
else{
improvement="Encourage students to ask doubts and allocate dedicated doubt-solving time.";
}

r2.innerHTML="Class Average: "+avg.toFixed(2);
s2.innerHTML="⭐ Strong Area: "+strong+"<br>⚠ Weak Area: "+weak+"<br>💡 Improvement: "+improvement;

// GRAPH FIX (important)
let ctx=document.getElementById("chart");

if(window.chart){
window.chart.destroy();
}

window.chart=new Chart(ctx,{
type:"bar",
data:{
labels:names,
datasets:[{
label:"Average Score",
data:arr
}]
}
});

};

reader.readAsText(file);
}

// file helper
function fileInput(){
let f=document.getElementById("file").files[0];
if(!f){
alert("Upload CSV");
return null;
}
return f;
}

</script>

</body>
</html>
