<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Panel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background: #dfe9f3;
  text-align: center;
  padding: 30px;
}

.card{
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button{
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  background: #5a67d8;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>👩‍🏫 Teacher Dashboard</h1>

<div class="card">

<h3>📊 View Student Responses</h3>
<button onclick="window.open('https://docs.google.com/spreadsheets/d/1oelarAPB7g7YQSQcUOKlyFsYXB5FtnCbgH0QC0qdoLE/edit?usp=sharing')">
Open Responses Sheet
</button>

<h3>🤖 Generate Questions using AI</h3>
<button onclick="window.open('https://chat.openai.com')">
Generate MCQ
</button>

<h3>📈 Performance Overview</h3>
<canvas id="chart"></canvas>

<p id="insight"></p>

</div>

<script>

let scores = [3,4,2,5,3];

new Chart(document.getElementById("chart"),{
 type:'bar',
 data:{
  labels:["S1","S2","S3","S4","S5"],
  datasets:[{label:'Scores',data:scores}]
 }
});

let weak = (scores.filter(s=>s<3).length / scores.length)*100;

document.getElementById("insight").innerText =
weak.toFixed(0) + "% students need improvement";

</script>

</body>
</html>
