<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
  text-align: center;
  padding: 40px;
}

h1{
  color: #444;
}

.card{
  background: #ffffff;
  padding: 25px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

input, button{
  padding: 12px;
  margin: 10px;
  width: 85%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button{
  background: #7c83fd;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

button:hover{
  background: #5a61e6;
}

p{
  color: #666;
}
</style>

</head>

<body>

<h1>👩‍🏫 Teacher Dashboard</h1>

<div class="card">

<h3>🤖 Generate Questions</h3>

<input type="text" id="topic" placeholder="Enter topic">

<button onclick="generateAI()">Generate Questions</button>

<p id="note"></p>

<h3>📝 Create Quiz Form</h3>
<button onclick="window.open('https://forms.google.com')">
Open Google Forms
</button>

<h3>📊 View Responses</h3>
<button onclick="window.open('https://docs.google.com/spreadsheets/d/1oelarAPB7g7YQSQcUOKlyFsYXB5FtnCbgH0QC0qdoLE/edit?usp=sharing')">
View Responses
</button>

</div>

<script>
function generateAI(){
  let topic = document.getElementById("topic").value;

  if(topic === ""){
    alert("Enter topic!");
    return;
  }

  let url = `https://chat.openai.com/?q=Generate 5 MCQs on ${topic} with answers`;
  window.open(url);

  document.getElementById("note").innerText =
  "👉 Copy questions → paste into Google Form";
}
</script>

</body>
</html>
