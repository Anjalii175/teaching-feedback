<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background: #dfe9f3;
  text-align: center;
  padding: 30px;
}

.card{
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button{
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  background: #5a67d8;
  color: white;
  cursor: pointer;
}

input, textarea{
  padding: 10px;
  width: 80%;
  margin: 10px;
}
</style>
</head>

<body>

<h1>👩‍🏫 Teacher Dashboard</h1>

<div class="card">

<h3>📊 View Responses</h3>
<button onclick="window.open('https://docs.google.com/spreadsheets/d/1oelarAPB7g7YQSQcUOKlyFsYXB5FtnCbgH0QC0qdoLE/edit?usp=sharing')">
Open Sheet
</button>

<h3>🤖 Generate Questions (AI)</h3>

<input type="text" id="topic" placeholder="Enter topic">

<br>

<button onclick="generateAI()">Generate Questions</button>

<p id="note"></p>

<h3>📝 Paste & Save Quiz</h3>

<textarea id="quizData" rows="8" placeholder="Paste AI questions here"></textarea>

<br>

<button onclick="saveQuiz()">Save Quiz</button>

<p id="saveMsg"></p>

<h3>📈 Performance</h3>
<canvas id="chart"></canvas>

<p id="insight"></p>

</div>

<script>

// AI open
function generateAI(){
  let topic = document.getElementById("topic").value;

  if(topic === ""){
    alert("Enter topic!");
    return;
  }

  let url = `https://chat.openai.com/?q=Give 5 MCQs on ${topic} with answers`;
  window.open(url);

  document.getElementById("note").innerText =
  "👉 Copy questions from AI and paste below";
}

// Save quiz
function saveQuiz(){
  let data = document.getElementById("quizData").value;

  if(data === ""){
    alert("Paste questions first!");
    return;
  }

  localStorage.setItem("quiz", data);

  document.getElementById("saveMsg").innerText =
  "✅ Quiz saved! Students can now see it.";
}

// demo graph
let scores = [3,4,2,5,3];

new Chart(document.getElementById("chart"),{
 type:'bar',
 data:{
  labels:["S1","S2","S3","S4","S5"],
  datasets:[{label:'Scores',data:scores}]
 }
});

let weak = (scores.filter(s=>s<3).length / scores.length)*100;

document.getElementById("insight").innerText =
weak.toFixed(0) + "% students need improvement";

</script>

</body>
</html>
