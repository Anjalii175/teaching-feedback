<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(to right, #43cea2, #185a9d);
  text-align: center;
  padding: 30px;
  color: white;
}
.card{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}
input, button{
  padding: 10px;
  margin: 10px;
  width: 80%;
  border-radius: 6px;
  border: none;
}
button{
  background: #5a67d8;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>👩‍🏫 Teacher Dashboard</h1>

<div class="card">

<h3>🤖 Generate Questions</h3>

<input type="text" id="topic" placeholder="Enter topic">

<button onclick="generateAI()">Generate Questions</button>

<p id="note"></p>

<h3>📝 Create Quiz Form</h3>
<button onclick="window.open('https://forms.google.com')">
Open Google Forms
</button>

<h3>📊 View Responses</h3>
<button onclick="window.open('https://docs.google.com/spreadsheets/d/1oelarAPB7g7YQSQcUOKlyFsYXB5FtnCbgH0QC0qdoLE/edit?usp=sharing')">
View Responses
</button>

</div>

<script>
function generateAI(){
  let topic = document.getElementById("topic").value;

  if(topic === ""){
    alert("Enter topic!");
    return;
  }

  let url = `https://chat.openai.com/?q=Generate 5 MCQs on ${topic} with answers`;
  window.open(url);

  document.getElementById("note").innerText =
  "👉 Copy questions → paste into Google Form";
}
</script>

</body>
</html>
